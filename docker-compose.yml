services:
  mysql:
    image: mysql:latest
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: memo_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    container_name: go-app
    environment:
      MYSQL_USER: user
      MYSQL_PASS: password
      MYSQL_HOST: mysql
      MYSQL_DBNAME: memo_db
    ports:
      - "8989:8989"
    depends_on:
      - mysql
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: vue-app
    environment:
      VUE_APP_API_URL: "http://backend:8989"  # バックエンドのAPI URL
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
